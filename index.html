<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ultimate Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Неоновая аура на фоне */
        .aura {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--neon-blue);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            top: -50px;
            right: -50px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Стеклянные карточки */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .card:active {
            transform: scale(0.95);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .card-large {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.05), rgba(188, 19, 254, 0.05));
        }

        .icon { font-size: 30px; margin-bottom: 10px; display: block; }
        .title { font-weight: 600; font-size: 14px; }
        .desc { font-size: 11px; opacity: 0.6; margin-top: 5px; }

        /* Поле ввода в стиле стекла */
        .chat-container {
            margin-top: 30px;
            display: none; /* Скрыто до выбора роли */
        }

        textarea {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            color: white;
            resize: none;
            box-sizing: border-box;
        }

        .btn-send {
            margin-top: 10px;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="aura"></div>
    
    <div class="header">
        <h1>Ultimate AI</h1>
        <p style="font-size: 12px; opacity: 0.5;">Выберите режим мощности</p>
    </div>

    <div class="grid" id="menu">
        <div class="card card-large" onclick="selectRole('🏗 Архитектор')">
            <span class="icon">🏗</span>
            <span class="title">Архитектор Автоматизаций</span>
            <div class="desc">Проектирование сложных систем и связок</div>
        </div>
        <div class="card" onclick="selectRole('🕵️ Детектор')">
            <span class="icon">🕵️</span>
            <span class="title">Детектор</span>
            <div class="desc">Поиск манипуляций</div>
        </div>
        <div class="card" onclick="selectRole('🧬 Арсен')">
            <span class="icon">🧬</span>
            <span class="title">База</span>
            <div class="desc">Маркарян Mode</div>
        </div>
        <div class="card card-large" onclick="selectRole('🔥 Ебейшая мотивация')">
            <span class="icon">🔥</span>
            <span class="title">Рофл Мотивация</span>
            <div class="desc">Заряд жесткой энергии</div>
        </div>
    </div>

    <div class="chat-container" id="chat">
        <h3 id="active-role-title"></h3>
        <textarea id="user-input" rows="4" placeholder="Введите ваш запрос..."></textarea>
        <button class="btn-send" onclick="sendRequest()">Отработать запрос</button>
        <button onclick="goBack()" style="background: none; border: none; color: gray; margin-top: 15px; width: 100%;">← Назад в меню</button>
        <div id="ai-response" style="margin-top: 20px; font-size: 14px; line-height: 1.6;"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#050505';

        let currentRole = "";

        function selectRole(role) {
            currentRole = role;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
            document.getElementById('active-role-title').innerText = role;
        }

        function goBack() {
            document.getElementById('menu').style.display = 'grid';
            document.getElementById('chat').style.display = 'none';
        }

        async function sendRequest() {
            const input = document.getElementById('user-input').value;
            const responseDiv = document.getElementById('ai-response');
            
            if (!input) return;
            
            responseDiv.innerHTML = "<i>Анализирую данные...</i>";
            
            // Здесь отправка на твой Python бэкенд
            const response = await fetch('https://твой-домен.ru/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    role: currentRole,
                    text: input,
                    user_id: tg.initDataUnsafe.user.id
                })
            });
            
            const data = await response.json();
            responseDiv.innerHTML = `<b>AI:</b> ${data.answer}`;
        }
    </script>
</body>
</html>
