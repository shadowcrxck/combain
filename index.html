<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-color: var(--neon-blue); /* Динамическая тема */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 16px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 9. Улучшение: Смена неоновых тем (Аура) */
        .aura {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--neon-color) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.12;
            z-index: -1;
            top: -100px; right: -100px;
            transition: var(--transition);
        }

        /* Шапка с выбором темы */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .theme-picker { display: flex; gap: 8px; }
        .theme-dot {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
        }

        /* Сетка категорий и ролей */
        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-color);
            margin: 20px 0 10px 5px;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* 3. Улучшение: Тактильная карточка */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .card:active { transform: scale(0.96); border-color: var(--neon-color); }

        .card-icon { font-size: 28px; margin-bottom: 12px; display: block; }
        .card-title { font-size: 15px; font-weight: 700; display: block; }
        .card-desc { font-size: 11px; opacity: 0.4; margin-top: 6px; line-height: 1.4; }

        /* 7. Улучшение: Режим фокусировки (Экран чата) */
        #chat-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }

        .role-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 100px;
            background: rgba(255,255,255,0.05);
            font-size: 12px;
            color: var(--neon-color);
            border: 1px solid var(--neon-color);
            margin-bottom: 15px;
        }

        /* 1. Улучшение: Смарт-чипсы */
        .chips-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .chip {
            padding: 8px 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
        }

        /* 8. Улучшение: Переключатели стиля */
        .toggles {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 12px;
            opacity: 0.6;
        }

        .toggle-btn.active {
            opacity: 1;
            border-color: var(--neon-color);
            background: rgba(0, 242, 255, 0.05);
        }

        /* Поле ввода и Кнопка */
        textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: var(--transition);
        }

        textarea:focus { border-color: var(--neon-color); }

        .btn-send {
            background: linear-gradient(90deg, var(--neon-color), var(--neon-purple));
            border: none;
            border-radius: 18px;
            padding: 20px;
            color: white;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        /* 4. Улучшение: Скелетон */
        .skeleton {
            display: none;
            margin-top: 20px;
        }

        .skeleton-line {
            height: 15px;
            background: linear-gradient(90deg, var(--glass) 25%, rgba(255,255,255,0.08) 50%, var(--glass) 75%);
            background-size: 200% 100%;
            animation: skeleton-load 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        @keyframes skeleton-load {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 10. Улучшение: Интерактивный Reasoning */
        .reasoning-box {
            background: rgba(255,255,255,0.03);
            border-left: 2px solid var(--neon-purple);
            padding: 10px;
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
            display: none;
        }

        /* 2. Улучшение: Кнопка копирования */
        .result-box {
            position: relative;
            margin-top: 20px;
            line-height: 1.6;
        }

        .copy-btn {
            position: absolute;
            top: -10px; right: 0;
            padding: 5px 10px;
            font-size: 10px;
            background: var(--neon-color);
            border-radius: 8px;
            color: black;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="aura" id="main-aura"></div>

    <div id="home-screen">
        <div class="app-header">
            <div>
                <h1 style="margin:0; font-size: 26px;">Nexus AI</h1>
                <p style="margin:5px 0 0; opacity:0.4; font-size:12px;">Центр управления системами</p>
            </div>
            <div class="theme-picker">
                <div class="theme-dot" style="background:#00f2ff" onclick="setTheme('#00f2ff')"></div>
                <div class="theme-dot" style="background:#bc13fe" onclick="setTheme('#bc13fe')"></div>
                <div class="theme-dot" style="background:#ff0055" onclick="setTheme('#ff0055')"></div>
            </div>
        </div>

        <div id="roles-grid"></div>
    </div>

    <div id="chat-screen">
        <div class="role-badge" id="active-badge">Архитектор</div>
        <h2 id="active-title" style="margin: 0 0 10px;">Название</h2>
        
        <div class="chips-container" id="chips"></div>

        <textarea id="user-input" rows="4" placeholder="Введите запрос..."></textarea>
        
        <div class="toggles">
            <button class="toggle-btn active" id="mode-detailed" onclick="toggleMode('detailed')">Подробно</button>
            <button class="toggle-btn" id="mode-brief" onclick="toggleMode('brief')">Кратко</button>
        </div>

        <button class="btn-send" onclick="sendRequest()">ЗАПУСТИТЬ ПРОЦЕСС</button>

        <div class="skeleton" id="skeleton">
            <div class="skeleton-line" style="width: 80%"></div>
            <div class="skeleton-line" style="width: 100%"></div>
            <div class="skeleton-line" style="width: 60%"></div>
        </div>

        <div class="reasoning-box" id="reasoning"></div>
        
        <div class="result-box">
            <div class="copy-btn" id="copy-btn" onclick="copyResult()">COPY</div>
            <div id="ai-output"></div>
        </div>

        <button onclick="closeRole()" style="background:none; border:none; color:gray; width:100%; margin-top:30px;">← Назад в меню</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const ROLES_DB = {
            "🛠 Power Tools": [
                { id: "arch", title: "Архитектор", icon: "🏗", desc: "API связки и логика", chips: ["ТГ + Sheets", "n8n схема", "FastAPI шаблон"] },
                { id: "research", title: "Deep Research", icon: "🔍", desc: "Анализ противоречий", chips: ["Анализ рынка", "Поиск фейков"] }
            ],
            "🎓 Учеба": [
                { id: "pres", title: "Презентолог", icon: "📊", desc: "Генерация .pptx файла", chips: ["Доклад по физике", "Бизнес-план"] },
                { id: "detect", title: "Детектор", icon: "🕵️", desc: "Поиск манипуляций", chips: ["Разбор договора", "Скрытый смысл"] }
            ],
            "🤡 Рофл Блок": [
                { id: "motivat", title: "Мотивация", icon: "🔥", desc: "Жесткий втык", chips: ["Дай пинка", "Почему я ленивый?"] },
                { id: "temki", title: "Темки", icon: "💸", desc: "Бизнес для пацанов", chips: ["Темка на 100к", "Общажный бизнес"] }
            ]
        };

        let currentRole = null;
        let selectedStyle = "detailed";

        // Генерация меню
        const grid = document.getElementById('roles-grid');
        for (const [cat, roles] of Object.entries(ROLES_DB)) {
            grid.innerHTML += `<div class="section-label">${cat}</div><div class="grid">` + 
                roles.map(r => `
                    <div class="card" onclick="openRole('${r.id}')">
                        <span class="card-icon">${r.icon}</span>
                        <span class="card-title">${r.title}</span>
                        <span class="card-desc">${r.desc}</span>
                    </div>
                `).join('') + `</div>`;
        }

        function setTheme(color) {
            document.documentElement.style.setProperty('--neon-color', color);
            triggerHaptic('light');
        }

        function triggerHaptic(style) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style);
        }

        function openRole(roleId) {
            triggerHaptic('medium');
            currentRole = findRole(roleId);
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'block';
            document.getElementById('active-title').innerText = currentRole.title;
            document.getElementById('active-badge').innerText = currentRole.title;
            
            const chipsBox = document.getElementById('chips');
            chipsBox.innerHTML = currentRole.chips.map(c => `<div class="chip" onclick="useChip('${c}')">${c}</div>`).join('');
        }

        function findRole(id) {
            for (const cat of Object.values(ROLES_DB)) {
                const r = cat.find(x => x.id === id);
                if (r) return r;
            }
        }

        function useChip(text) {
            document.getElementById('user-input').value = text;
            triggerHaptic('light');
        }

        function toggleMode(mode) {
            selectedStyle = mode;
            document.getElementById('mode-detailed').classList.toggle('active', mode === 'detailed');
            document.getElementById('mode-brief').classList.toggle('active', mode === 'brief');
            triggerHaptic('light');
        }

        async function sendRequest() {
            const text = document.getElementById('user-input').value;
            if (!text) return;

            triggerHaptic('heavy');
            document.getElementById('skeleton').style.display = 'block';
            document.getElementById('ai-output').innerText = "";
            document.getElementById('reasoning').style.display = 'none';
            document.getElementById('copy-btn').style.display = 'none';

            try {
                const response = await fetch('https://твой-домен.ru/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        role: currentRole.title,
                        text: text,
                        style: selectedStyle
                    })
                });
                const data = await response.json();
                
                document.getElementById('skeleton').style.display = 'none';
                
                if (data.reasoning) {
                    document.getElementById('reasoning').style.display = 'block';
                    document.getElementById('reasoning').innerText = "Ход мыслей: " + data.reasoning;
                }
                
                document.getElementById('ai-output').innerText = data.answer;
                document.getElementById('copy-btn').style.display = 'block';

                // Если это презентация - даем кнопку скачать (5. Улучшение)
                if (currentRole.id === 'pres' && data.file_url) {
                    document.getElementById('ai-output').innerHTML += `<br><button class="btn-send" onclick="window.open('${data.file_url}')">СКАЧАТЬ .PPTX</button>`;
                }
            } catch (e) {
                document.getElementById('skeleton').style.display = 'none';
                document.getElementById('ai-output').innerText = "Ошибка связи.";
            }
        }

        function copyResult() {
            const text = document.getElementById('ai-output').innerText;
            navigator.clipboard.writeText(text);
            document.getElementById('copy-btn').innerText = "COPIED!";
            triggerHaptic('medium');
            setTimeout(() => document.getElementById('copy-btn').innerText = "COPY", 2000);
        }

        function closeRole() {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('chat-screen').style.display = 'none';
        }
    </script>
</body>
</html>
